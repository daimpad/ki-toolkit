name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare build
        run: |
          mkdir -p _build
          cp -r site/. _build/
          cp -r pics       _build/pics
          cp -r svg        _build/svg
          [ -d fonts ]         && cp -r fonts         _build/fonts
          [ -d kartengenerator ] && cp -r kartengenerator _build/kartengenerator
          [ -d pdf ]           && cp -r pdf           _build/pdf

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
